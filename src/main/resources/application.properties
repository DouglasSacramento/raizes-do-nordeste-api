spring.application.name=api

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:raizesdonordestedb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVERCLASSNAME:org.postgresql.Driver}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}

springdoc.api-docs.enabled=${SPRINGDOC_APIDOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGERUI_ENABLED:true}

api.security.token.secret=${JWT_SECRET:sua_senha_super_secreta_aqui}
api.security.token.expiration=${JWT_EXPIRATION:7200000}