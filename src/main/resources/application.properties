spring.application.name=api

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:raizesdonordestedb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVERCLASSNAME:org.postgresql.Driver}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED}

springdoc.api-docs.enabled=${SPRINGDOC_APIDOCS_ENABLED}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGERUI_ENABLED}

api.security.token.secret=${JWT_SECRET}
api.security.token.expiration=${JWT_EXPIRATION}